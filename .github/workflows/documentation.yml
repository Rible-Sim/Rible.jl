name: Documentation

on:
  push:
    branches:
      - main
      - dev
      - feature/better_docs
    tags:
      - '*'
  pull_request:

jobs:
  build:
    name: Documentation
    permissions:
      actions: write
      contents: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'
      - uses: julia-actions/cache@v3
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install dependencies
        run: |
          julia --project=. -e 'import Pkg; Pkg.instantiate(); Pkg.precompile()'
          julia --project=docs/ -e 'import Pkg; Pkg.instantiate(); Pkg.precompile()'
      - name: Build multilingual docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        run: bash docs/make_combined.sh
      - name: Stage for deploy
        if: github.event_name != 'pull_request'
        run: |
          mkdir public
          mv docs/build_combined/1/* public/
      - name: Ensure Cloudflare Pages project
        if: github.event_name != 'pull_request'
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create riblejl --production-branch=dev
      - name: Deploy to Cloudflare Pages
        if: github.event_name != 'pull_request'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=riblejl --branch="${{ github.head_ref || github.ref_name }}" --commit-hash="${{ github.sha }}"
